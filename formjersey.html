<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buy Product</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .kd{
      color: rgb(31, 230, 137);
    }
  </style>
</head>

<body>
<div class="container my-5">
  <h1 class="mb-4">Buy Product</h1>

  <!-- 🔥 PRODUCT INFO -->
  <form id="buyForm">

    <div class="mb-3">
      <label class="form-label">Product</label>
      <input type="text" class="form-control" id="productName" readonly>
    </div>

    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" class="form-control" id="fullName" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Phone Number</label>
      <input type="tel" class="form-control" id="phone" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Address</label>
      <textarea class="form-control" id="address" rows="3" required></textarea>
    </div>

    <div class="mb-3">
      <label class="form-label">Quantity</label>
      <input type="number" class="form-control" id="quantity" min="1" value="1" required>
    </div>

    <!-- 🔥 UPI QR SECTION -->
    <div class="mb-4 text-center border p-3 rounded">
      <h5>Scan & Pay</h5>

      <!-- 🔴 Replace this image with your real QR -->
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=yourupi@upi&pn=MyShop&cu=INR"
           width="220">

      <p class="mt-2"><b>UPI ID:</b> Vishva Kd</p>
      <p class="Kd" style="color: rgb(17, 131, 97);">Scan QR → Pay → Enter Transaction ID below</p>
    </div>


 <div class="mb-3">
      <label class="form-label">Amount</label>
      <input type="number" class="form-control" id="quantity" min="1" value="" required placeholder="Amount">
    </div>

    <!-- 🔥 Transaction ID -->
    <div class="mb-3">
      <label class="form-label">Transaction ID</label>
      <input type="text" class="form-control" id="txnId" required>
    </div>

    <button type="submit" class="btn btn-success">Submit Order</button>
  </form>

  <!-- 🔥 SUCCESS MESSAGE -->
  <div id="successMsg" class="alert alert-success mt-3" style="display:none;">
    Order placed successfully!
  </div>
</div>

<script>
// 🔥 Product from URL
const urlParams = new URLSearchParams(window.location.search);
const product = urlParams.get('product');
document.getElementById('productName').value = product || 'Unknown Product';

// 🔥 Form submit
document.getElementById('buyForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const data = {
    product: document.getElementById('productName').value,
    name: document.getElementById('fullName').value,
    phone: document.getElementById('phone').value,
    address: document.getElementById('address').value,
    quantity: document.getElementById('quantity').value,
    txnId: document.getElementById('txnId').value
  };

  // 🔥 Save orders locally
  let orders = JSON.parse(localStorage.getItem("orders")) || [];
  orders.push(data);
  localStorage.setItem("orders", JSON.stringify(orders));

  console.log("Order Saved:", data);

  document.getElementById('successMsg').style.display = 'block';

  this.reset();
  document.getElementById('productName').value = product || 'Unknown Product';

  setTimeout(() => {
    document.getElementById('successMsg').style.display = 'none';
  }, 3000);
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
